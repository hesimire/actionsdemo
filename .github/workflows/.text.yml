name: GitHub Actions Demo #工作流名称，用于在GitHub Actions中显示
on: [push] #触发条件，这里是当有代码被推送到仓库时触发

permissions:
  contents: write #读取仓库的代码内容

jobs: #工作流中的任务，每个任务都有一个或多个步骤
  build-and-deploy: #任务名称
    runs-on: ubuntu-latest #运行环境，这里使用最新的Ubuntu系统
    steps: #任务中的步骤，每个步骤都是一个独立的操作
      - name: Checkout code #步骤名称
        uses: actions/checkout@v6 #使用GitHub官方提供的checkout action来检出代码

      - name: Install add build dependencies #步骤名称
        run: |
          npm install -g pnpm 
          pnpm install 
          pnpm docs:build

      - name: Deploy to GitHub Pages #步骤名称
        uses: JamesIves/github-pages-deploy-action@v4 #使用第三方提供的actions-gh-pages action来部署到GitHub Pages
        with:
          folder: .vitepress/dist #指定要发布的目录，这里是构建后的dist目录
          github_token: ${{ secrets.GITHUB_TOKEN }} #使用GitHub Actions的GITHUB_TOKEN来部署到GitHub Pages仓库
          branch: gh-pages #指定要部署到的分支，这里是main分支
